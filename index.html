<!DOCTYPE html>

<html> 
 <head>
    <title>Tiltle</title> 
</head>
	<body>
		<div class="tab">
  <button class="tablinks" onclick="openCity(event, 'About_me')">About Me</button>
  <button class="tablinks" onclick="openCity(event, 'Me_On_Scratch')">Me On Scratch</button>
  <button class="tablinks" onclick="openCity(event, 'Me_On_Minecraft')">Me On Minecraft</button>
</div>

<!-- Tab content -->
<div id="London" class="tabcontent">
  <h3>London</h3>
  <p>London is the capital city of England.</p>
</div>

<div id="Paris" class="tabcontent">
  <h3>Paris</h3>
  <p>Paris is the capital of France.</p>
</div>

<div id="Tokyo" class="tabcontent">
  <h3>Tokyo</h3>
  <p>Tokyo is the capital of Japan.</p>
</div>
		<style>
			.tab {
  overflow: hidden;
  border: 1px solid #ccc;
  background-color: #f1f1f1;
}

/* Style the buttons that are used to open the tab content */
.tab button {
  background-color: inherit;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 14px 16px;
  transition: 0.3s;
}


.tab button:hover {
  background-color: #ddd;
}


.tab button.active {
  background-color: #ccc;
}


.tabcontent {
  display: none;
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-top: none;
}
		</style>	
	</body>
	
 

</html>
